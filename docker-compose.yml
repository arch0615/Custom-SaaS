services:
  postgres:
    image: postgres:16-alpine
    container_name: customs-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: customs
      POSTGRES_PASSWORD: dev_only_password
      POSTGRES_DB: customs_saas_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customs -d customs_saas_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: customs-saas-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio_dev
      MINIO_ROOT_PASSWORD: minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
